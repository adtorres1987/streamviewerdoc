name: syncpdf
description: SyncPDF — Collaborative PDF viewer with real-time sync.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # PDF
  syncfusion_flutter_pdfviewer: ^26.1.35

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP client
  dio: ^5.4.3+1

  # Secure token storage
  flutter_secure_storage: ^9.0.0

  # WebSocket
  web_socket_channel: ^3.0.0

  # Auth / Storage
  supabase_flutter: ^2.5.0

  # Payments
  flutter_stripe: ^10.1.1

  # File selection (used in Phase 8 for PDF upload)
  file_picker: ^8.0.0

  # Date formatting
  intl: ^0.19.0

  # Deep linking
  app_links: ^6.3.3

  # Code generation support
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
